<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Investimentos</title>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Gerenciador de Investimentos</h1>

        <nav>
            <button class="botao-reais moeda-ativa">R$</button>
            <button class="botao-dolares">US$</button>
        </nav>
    </header>

    <main>
        <section class="total">
            <div class="card-total">
                <h2>Total</h2>
                <p>R$ 0,00</p>
            </div>            
        </section>

        <section class="tipos">
            <!-- aqui entrarão as divs igual a de cima com a classe card-tipos -->
            <button class="botao-novo-tipo">Adicionar novo tipo de investimento</button>
        </section>
    </main>
</body>
</html>
