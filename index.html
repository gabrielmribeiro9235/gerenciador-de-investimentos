<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gerenciador de Investimentos - Acompanhe/Controle seus investimentos</title>

    <meta name="description" content="Gerencie investimentos em diferentes categorias e acompanhe seus ativos em real e dólar.">

    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Gerenciador de Investimentos</h1>

        <nav aria-label="Seleção de moeda">
            <button class="botao-reais moeda-ativa" aria-label="Exibir valores em reais">R$</button>
            <button class="botao-dolares" aria-label="Exibir valores em dólares">US$</button>
        </nav>
    </header>

    <main>
        <section class="total">
            <div class="card-total">
                <h2>Total</h2>
                <p>R$ 0,00</p>
            </div>            
        </section>

        <section class="tipos" aria-label="Lista de investimentos">
            <!-- aqui entrarão as divs igual a de cima com a classe card-tipos -->
        </section>
        <button class="botao-novo-tipo">Adicionar novo tipo de investimento</button>
    </main>
     <script src="script.js"></script>
</body>
</html>
